<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>声愈管理后台 - 登录</title>
  <link rel="stylesheet" href="https://unpkg.com/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary-color: #6366f1;
      --primary-dark: #4f46e5;
      --bg-dark: #0f172a;
      --bg-light: #1e293b;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border-color: #334155;
      --bulb-off: #475569;
      --bulb-on: #fbbf24;
      --rope-color: #8b7355;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-dark);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* 背景装饰 */
    .bg-decoration {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .bg-decoration::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
      animation: bgFloat 20s ease-in-out infinite;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-20px, 20px) rotate(-1deg); }
    }

    /* 主容器 - PC端横向布局 */
    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .content-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      max-width: 1200px;
      width: 100%;
    }

    /* 台灯区域 */
    .lamp-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 灯座 */
    .lamp-base {
      width: 80px;
      height: 20px;
      background: linear-gradient(180deg, #64748b 0%, #475569 100%);
      border-radius: 10px 10px 0 0;
      position: relative;
      z-index: 2;
    }

    /* 灯杆 */
    .lamp-pole {
      width: 8px;
      height: 120px;
      background: linear-gradient(90deg, #64748b 0%, #94a3b8 50%, #64748b 100%);
      position: relative;
    }

    /* 灯头 */
    .lamp-head {
      position: relative;
      margin-bottom: -10px;
    }

    .lamp-shade {
      width: 140px;
      height: 80px;
      background: linear-gradient(180deg, #475569 0%, #334155 100%);
      border-radius: 70px 70px 20px 20px;
      position: relative;
      z-index: 2;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    /* 灯泡 */
    .bulb {
      width: 60px;
      height: 60px;
      background: var(--bulb-off);
      border-radius: 50%;
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      transition: all 0.5s ease;
      z-index: 1;
    }

    .bulb.on {
      background: var(--bulb-on);
      box-shadow: 
        0 0 60px rgba(251, 191, 36, 0.8),
        0 0 100px rgba(251, 191, 36, 0.5),
        0 0 140px rgba(251, 191, 36, 0.3);
      animation: bulbPulse 2s ease-in-out infinite;
    }

    @keyframes bulbPulse {
      0%, 100% { 
        box-shadow: 
          0 0 60px rgba(251, 191, 36, 0.8),
          0 0 100px rgba(251, 191, 36, 0.5),
          0 0 140px rgba(251, 191, 36, 0.3);
      }
      50% { 
        box-shadow: 
          0 0 80px rgba(251, 191, 36, 1),
          0 0 120px rgba(251, 191, 36, 0.6),
          0 0 160px rgba(251, 191, 36, 0.4);
      }
    }

    /* 拉绳开关 */
    .pull-switch {
      position: absolute;
      right: 20px;
      top: 60px;
      cursor: grab;
      user-select: none;
      z-index: 10;
    }

    .pull-switch:active {
      cursor: grabbing;
    }

    .rope-container {
      position: relative;
      width: 3px;
      height: 60px;
      background: linear-gradient(90deg, var(--rope-color) 0%, #a0826d 50%, var(--rope-color) 100%);
      transform-origin: top center;
      transition: transform 0.1s ease;
    }

    .rope-container.pulling {
      animation: ropeSwing 0.6s ease-out;
    }

    @keyframes ropeSwing {
      0% { transform: translateY(0) rotate(0deg); }
      30% { transform: translateY(40px) rotate(5deg); }
      50% { transform: translateY(40px) rotate(-3deg); }
      70% { transform: translateY(20px) rotate(2deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    .rope-handle {
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 24px;
      background: linear-gradient(180deg, #fbbf24 0%, #f59e0b 100%);
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(251, 191, 36, 0.4);
    }

    .rope-handle::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
    }

    .switch-hint {
      position: absolute;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }

    .pull-switch:hover .switch-hint {
      opacity: 1;
    }

    /* 登录表单 */
    .login-section {
      opacity: 0;
      transform: translateX(50px);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    .login-section.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: all;
    }

    .login-container {
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px;
      width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary-color) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: rgba(15, 23, 42, 0.6);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 15px;
      color: var(--text-primary);
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .form-group i {
      position: absolute;
      left: 16px;
      top: 42px;
      color: var(--text-secondary);
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .form-group input:focus + i {
      color: var(--primary-color);
    }

    .captcha-wrapper {
      display: flex;
      gap: 12px;
    }

    .captcha-wrapper input {
      flex: 1;
      padding-left: 16px;
    }

    .captcha-image {
      height: 52px;
      border-radius: 12px;
      border: 2px solid var(--border-color);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .captcha-image:hover {
      border-color: var(--primary-color);
      transform: scale(1.02);
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      margin-top: 8px;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn-login:hover::before {
      left: 100%;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    }

    /* PC端动画效果 */
    @media (min-width: 769px) {
      .content-wrapper {
        flex-direction: row;
      }

      .lamp-section {
        transform: translateX(0);
      }

      .lamp-section.pulled {
        transform: translateX(-150px);
      }

      .login-section {
        transform: translateX(100px);
      }

      .login-section.active {
        transform: translateX(0);
      }
    }

    /* 手机端样式 */
    @media (max-width: 768px) {
      .container {
        padding: 0;
      }

      .content-wrapper {
        flex-direction: column;
        gap: 0;
        min-height: 100vh;
        position: relative;
      }

      .lamp-section {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .lamp-section.pulled {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
        pointer-events: none;
      }

      .lamp-shade {
        width: 120px;
        height: 70px;
      }

      .bulb {
        width: 50px;
        height: 50px;
        bottom: -25px;
      }

      .lamp-pole {
        height: 100px;
      }

      .login-section {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0;
        width: 90%;
        max-width: 360px;
        transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .login-section.active {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      .login-container {
        width: 100%;
        padding: 30px 24px;
      }

      .login-header h1 {
        font-size: 24px;
      }

      .switch-hint {
        font-size: 14px;
        top: 90px;
      }
    }

    /* 加载动画 */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border-color);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 提示文字 */
    .hint-text {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.5s ease 0.3s;
    }

    .login-section.active .hint-text {
      opacity: 1;
      transform: translateY(0);
    }

    .hint-text i {
      margin-right: 6px;
      color: var(--primary-color);
    }
  </style>
</head>
<body>
  <!-- 加载遮罩 -->
  <div class="loading-overlay" id="loading">
    <div class="loader"></div>
  </div>

  <!-- 背景装饰 -->
  <div class="bg-decoration"></div>

  <!-- 主容器 -->
  <div class="container">
    <div class="content-wrapper">
      <!-- 台灯区域 -->
      <div class="lamp-section" id="lampSection">
        <div class="lamp-head">
          <div class="lamp-shade"></div>
          <div class="bulb" id="bulb"></div>
        </div>
        <div class="lamp-pole"></div>
        <div class="lamp-base"></div>
        
        <!-- 拉绳开关 -->
        <div class="pull-switch" id="pullSwitch">
          <div class="rope-container" id="ropeContainer">
            <div class="rope-handle"></div>
          </div>
          <span class="switch-hint">下拉开启</span>
        </div>
      </div>

      <!-- 登录表单 -->
      <div class="login-section" id="loginSection">
        <div class="login-container">
          <div class="login-header">
            <h1>声愈管理后台</h1>
            <p>欢迎回来，请登录您的账户</p>
          </div>

          <form id="loginForm">
            <div class="form-group">
              <label>用户名</label>
              <input type="text" id="username" placeholder="请输入用户名" required>
              <i class="fas fa-user"></i>
            </div>

            <div class="form-group">
              <label>密码</label>
              <input type="password" id="password" placeholder="请输入密码" required>
              <i class="fas fa-lock"></i>
            </div>

            <div class="form-group">
              <label>验证码</label>
              <div class="captcha-wrapper">
                <input type="text" id="captcha" placeholder="请输入验证码" required maxlength="4">
                <img id="captchaImage" class="captcha-image" src="" alt="验证码" title="点击刷新">
              </div>
            </div>

            <button type="submit" class="btn-login">
              <i class="fas fa-sign-in-alt"></i> 登录
            </button>
          </form>

          <div class="hint-text">
            <i class="fas fa-lightbulb"></i>
            提示：下拉灯绳可切换显示
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 页面加载完成后隐藏加载动画
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
      }, 500);
    });

    // 获取元素
    const pullSwitch = document.getElementById('pullSwitch');
    const ropeContainer = document.getElementById('ropeContainer');
    const lampSection = document.getElementById('lampSection');
    const bulb = document.getElementById('bulb');
    const loginSection = document.getElementById('loginSection');
    const switchHint = document.querySelector('.switch-hint');
    
    let isPulled = false;
    let isDragging = false;
    let startY = 0;
    let currentY = 0;

    // 检查是否为移动端
    const isMobile = window.innerWidth <= 768;

    // 拉动动画
    function pullAnimation() {
      if (ropeContainer.classList.contains('pulling')) return;
      
      ropeContainer.classList.add('pulling');
      
      setTimeout(() => {
        isPulled = !isPulled;
        
        if (isPulled) {
          // 开灯
          bulb.classList.add('on');
          lampSection.classList.add('pulled');
          loginSection.classList.add('active');
          switchHint.textContent = '下拉关闭';
        } else {
          // 关灯
          bulb.classList.remove('on');
          lampSection.classList.remove('pulled');
          loginSection.classList.remove('active');
          switchHint.textContent = '下拉开启';
        }
        
        setTimeout(() => {
          ropeContainer.classList.remove('pulling');
        }, 300);
      }, 300);
    }

    // 鼠标/触摸事件处理
    function handleStart(e) {
      isDragging = true;
      startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
      ropeContainer.style.transition = 'none';
    }

    function handleMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      
      currentY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
      const deltaY = currentY - startY;
      
      if (deltaY > 0) {
        const pullDistance = Math.min(deltaY, 60);
        ropeContainer.style.transform = `translateY(${pullDistance}px)`;
      }
    }

    function handleEnd(e) {
      if (!isDragging) return;
      isDragging = false;
      
      ropeContainer.style.transition = 'transform 0.3s ease';
      ropeContainer.style.transform = 'translateY(0)';
      
      const deltaY = currentY - startY;
      if (deltaY > 40) {
        pullAnimation();
      }
    }

    // 绑定事件
    pullSwitch.addEventListener('mousedown', handleStart);
    document.addEventListener('mousemove', handleMove);
    document.addEventListener('mouseup', handleEnd);

    pullSwitch.addEventListener('touchstart', handleStart, { passive: false });
    document.addEventListener('touchmove', handleMove, { passive: false });
    document.addEventListener('touchend', handleEnd);

    // 点击事件（作为备选）
    pullSwitch.addEventListener('click', (e) => {
      if (!isDragging) {
        pullAnimation();
      }
    });

    // 验证码刷新
    const captchaImage = document.getElementById('captchaImage');
    
    function refreshCaptcha() {
      captchaImage.src = `/api/captcha?t=${Date.now()}`;
    }
    
    captchaImage.addEventListener('click', refreshCaptcha);
    refreshCaptcha();

    // 表单提交
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const captcha = document.getElementById('captcha').value;
      
      try {
        const response = await fetch('/api/auth/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password, captcha })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = '/admin/index.html';
        } else {
          alert(data.error || '登录失败');
          refreshCaptcha();
        }
      } catch (error) {
        console.error('登录错误:', error);
        alert('网络错误，请稍后重试');
      }
    });

    // 窗口大小改变时重新检测
    window.addEventListener('resize', () => {
      const newIsMobile = window.innerWidth <= 768;
      if (newIsMobile !== isMobile) {
        location.reload();
      }
    });
  </script>
</body>
</html>
