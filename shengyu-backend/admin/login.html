<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>声愈管理后台 - 登录</title>
  <link rel="stylesheet" href="https://unpkg.com/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary-color: #6366f1;
      --primary-dark: #4f46e5;
      --bg-dark: #0a0a1a;
      --bg-light: #1a1a2e;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --border-color: #2a2a3e;
      --bulb-off: #3a3a4e;
      --bulb-on: #ffd700;
      --rope-color: #c9a86c;
      --gold: #ffd700;
      --gold-light: #ffed4e;
      --gold-dark: #b8860b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* 背景装饰 - 星空效果 */
    .bg-decoration {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .bg-decoration::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
        radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
      animation: sparkle 10s linear infinite;
      opacity: 0.5;
    }

    @keyframes sparkle {
      from { transform: translateY(0); }
      to { transform: translateY(-200px); }
    }

    /* 主容器 */
    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .content-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 80px;
      max-width: 1400px;
      width: 100%;
    }

    /* 左侧区域 - PC端显示标题和台灯 */
    .left-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 像素风标题 */
    .pixel-title {
      font-family: 'Press Start 2P', cursive;
      font-size: 24px;
      text-align: center;
      line-height: 1.8;
      animation: pixelGlow 2s ease-in-out infinite, colorShift 4s ease-in-out infinite;
      text-shadow: 
        0 0 10px rgba(255, 215, 0, 0.8),
        0 0 20px rgba(255, 215, 0, 0.5),
        0 0 30px rgba(255, 215, 0, 0.3);
      transition: all 0.8s ease;
    }

    .pixel-title.hidden {
      opacity: 0;
      transform: scale(0.8);
    }

    @keyframes pixelGlow {
      0%, 100% { 
        text-shadow: 
          0 0 10px rgba(255, 215, 0, 0.8),
          0 0 20px rgba(255, 215, 0, 0.5),
          0 0 30px rgba(255, 215, 0, 0.3);
      }
      50% { 
        text-shadow: 
          0 0 20px rgba(255, 100, 100, 0.9),
          0 0 40px rgba(255, 100, 100, 0.6),
          0 0 60px rgba(255, 100, 100, 0.4);
      }
    }

    @keyframes colorShift {
      0%, 100% { 
        color: #ffd700;
        filter: hue-rotate(0deg);
      }
      25% { 
        color: #ff6b6b;
        filter: hue-rotate(90deg);
      }
      50% { 
        color: #4ecdc4;
        filter: hue-rotate(180deg);
      }
      75% { 
        color: #a78bfa;
        filter: hue-rotate(270deg);
      }
    }

    .pixel-title .line1 {
      display: block;
      font-size: 18px;
      margin-bottom: 10px;
      animation: bounce 1s ease-in-out infinite;
    }

    .pixel-title .line2 {
      display: block;
      font-size: 28px;
      animation: bounce 1s ease-in-out infinite 0.2s;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* 台灯区域 */
    .lamp-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 灯座 - 尊贵金色 */
    .lamp-base {
      width: 100px;
      height: 25px;
      background: linear-gradient(180deg, 
        var(--gold-light) 0%, 
        var(--gold) 30%,
        var(--gold-dark) 100%);
      border-radius: 12px 12px 0 0;
      position: relative;
      z-index: 2;
      box-shadow: 
        0 5px 15px rgba(255, 215, 0, 0.3),
        inset 0 2px 5px rgba(255, 255, 255, 0.3);
    }

    .lamp-base::after {
      content: '';
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 8px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      border-radius: 4px;
    }

    /* 灯杆 - 金属质感 */
    .lamp-pole {
      width: 10px;
      height: 140px;
      background: linear-gradient(90deg, 
        #2a2a3e 0%, 
        #4a4a5e 20%,
        #6a6a7e 50%,
        #4a4a5e 80%,
        #2a2a3e 100%);
      position: relative;
      box-shadow: 
        inset 2px 0 5px rgba(0,0,0,0.3),
        inset -2px 0 5px rgba(255,255,255,0.1);
    }

    /* 灯头 */
    .lamp-head {
      position: relative;
      margin-bottom: -15px;
    }

    .lamp-shade {
      width: 160px;
      height: 90px;
      background: linear-gradient(180deg, 
        #2a2a3e 0%, 
        #1a1a2e 50%,
        #0a0a1a 100%);
      border-radius: 80px 80px 25px 25px;
      position: relative;
      z-index: 2;
      box-shadow: 
        0 15px 40px rgba(0, 0, 0, 0.5),
        inset 0 -5px 20px rgba(255, 215, 0, 0.1);
      border: 2px solid rgba(255, 215, 0, 0.2);
    }

    .lamp-shade::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 30px;
      background: linear-gradient(180deg, 
        rgba(255, 215, 0, 0.3) 0%,
        transparent 100%);
      border-radius: 50px 50px 0 0;
    }

    /* 灯泡 - 渐变光色 */
    .bulb {
      width: 70px;
      height: 70px;
      background: radial-gradient(circle at 30% 30%, 
        var(--bulb-off) 0%,
        #2a2a3e 100%);
      border-radius: 50%;
      position: absolute;
      bottom: -35px;
      left: 50%;
      transform: translateX(-50%);
      transition: all 0.5s ease;
      z-index: 1;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }

    .bulb.on {
      background: radial-gradient(circle at 30% 30%, 
        #fff 0%,
        var(--gold-light) 20%,
        var(--gold) 50%,
        var(--gold-dark) 100%);
      box-shadow: 
        0 0 60px rgba(255, 215, 0, 0.9),
        0 0 100px rgba(255, 215, 0, 0.6),
        0 0 140px rgba(255, 215, 0, 0.4),
        0 0 200px rgba(255, 215, 0, 0.2),
        inset 0 0 30px rgba(255, 255, 255, 0.5);
      animation: bulbPulse 2s ease-in-out infinite;
    }

    @keyframes bulbPulse {
      0%, 100% { 
        box-shadow: 
          0 0 60px rgba(255, 215, 0, 0.9),
          0 0 100px rgba(255, 215, 0, 0.6),
          0 0 140px rgba(255, 215, 0, 0.4),
          0 0 200px rgba(255, 215, 0, 0.2);
      }
      50% { 
        box-shadow: 
          0 0 80px rgba(255, 100, 100, 1),
          0 0 120px rgba(255, 100, 100, 0.7),
          0 0 160px rgba(255, 100, 100, 0.5),
          0 0 240px rgba(255, 100, 100, 0.3);
      }
    }

    /* 拉绳开关 - 金色装饰 */
    .pull-switch {
      position: absolute;
      right: 25px;
      top: 70px;
      cursor: grab;
      user-select: none;
      z-index: 10;
    }

    .pull-switch:active {
      cursor: grabbing;
    }

    .rope-container {
      position: relative;
      width: 4px;
      height: 70px;
      background: linear-gradient(90deg, 
        var(--rope-color) 0%, 
        #e8d5a3 50%, 
        var(--rope-color) 100%);
      transform-origin: top center;
      transition: transform 0.1s ease;
      box-shadow: 1px 0 3px rgba(0,0,0,0.3);
    }

    .rope-container.pulling {
      animation: ropeSwing 0.6s ease-out;
    }

    @keyframes ropeSwing {
      0% { transform: translateY(0) rotate(0deg); }
      30% { transform: translateY(50px) rotate(5deg); }
      50% { transform: translateY(50px) rotate(-3deg); }
      70% { transform: translateY(25px) rotate(2deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    .rope-handle {
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 30px;
      background: linear-gradient(180deg, 
        var(--gold-light) 0%, 
        var(--gold) 50%,
        var(--gold-dark) 100%);
      border-radius: 10px;
      box-shadow: 
        0 3px 10px rgba(255, 215, 0, 0.5),
        inset 0 2px 5px rgba(255, 255, 255, 0.4);
    }

    .rope-handle::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
      border-radius: 50%;
    }

    .switch-hint {
      position: absolute;
      top: 110px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--gold);
      white-space: nowrap;
      opacity: 0.8;
      transition: opacity 0.3s ease;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .pull-switch:hover .switch-hint {
      opacity: 1;
    }

    /* 登录表单 */
    .login-section {
      opacity: 0;
      transform: translateX(50px);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    .login-section.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: all;
    }

    .login-container {
      background: rgba(26, 26, 46, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 24px;
      padding: 40px;
      width: 420px;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 30px rgba(255, 215, 0, 0.1);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold) 0%, #fff 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
      line-height: 1.5;
    }

    .login-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: rgba(10, 10, 26, 0.8);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 15px;
      color: var(--text-primary);
      transition: all 0.3s ease;
    }

    .form-group input::placeholder {
      color: var(--text-secondary);
      opacity: 0.5;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.1);
    }

    .form-group i {
      position: absolute;
      left: 16px;
      top: 42px;
      color: var(--text-secondary);
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .form-group input:focus + i {
      color: var(--gold);
    }

    /* 验证码 */
    .captcha-wrapper {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .captcha-wrapper input {
      flex: 1;
      padding-left: 16px;
    }

    .captcha-image {
      height: 52px;
      border-radius: 12px;
      border: 2px solid var(--border-color);
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.1);
      min-width: 120px;
    }

    .captcha-image:hover {
      border-color: var(--gold);
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
    }

    .captcha-image[src=""] {
      background: linear-gradient(90deg, 
        rgba(255,215,0,0.1) 0%, 
        rgba(255,215,0,0.2) 50%, 
        rgba(255,215,0,0.1) 100%);
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200px 0; }
      100% { background-position: 200px 0; }
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      color: #0a0a1a;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      margin-top: 8px;
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: left 0.5s ease;
    }

    .btn-login:hover::before {
      left: 100%;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
    }

    /* PC端动画效果 */
    @media (min-width: 769px) {
      .content-wrapper {
        flex-direction: row;
      }

      .left-section {
        transform: translateX(0);
      }

      .left-section.pulled {
        transform: translateX(-100px);
      }

      .pixel-title.hidden {
        opacity: 0;
        transform: scale(0.8);
      }

      .login-section {
        transform: translateX(100px);
      }

      .login-section.active {
        transform: translateX(0);
      }
    }

    /* 手机端样式 */
    @media (max-width: 768px) {
      .container {
        padding: 0;
      }

      .content-wrapper {
        flex-direction: column;
        gap: 0;
        min-height: 100vh;
        position: relative;
      }

      .left-section {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .left-section.pulled {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
        pointer-events: none;
      }

      .pixel-title {
        font-size: 16px;
      }

      .pixel-title .line1 {
        font-size: 12px;
      }

      .pixel-title .line2 {
        font-size: 20px;
      }

      .lamp-shade {
        width: 130px;
        height: 75px;
      }

      .bulb {
        width: 55px;
        height: 55px;
        bottom: -27px;
      }

      .lamp-pole {
        height: 110px;
      }

      .login-section {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0;
        width: 90%;
        max-width: 360px;
        transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .login-section.active {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      .login-container {
        width: 100%;
        padding: 30px 24px;
      }

      .login-header h1 {
        font-size: 24px;
      }

      /* 移动端下拉提示位置调整 - 放在台灯下方 */
      .lamp-section {
        position: relative;
        padding-bottom: 60px;
      }

      .pull-switch {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .rope-container {
        height: 40px;
      }

      .switch-hint {
        position: relative;
        top: auto;
        left: auto;
        transform: none;
        font-size: 12px;
        margin-top: 10px;
        animation: hintPulse 2s ease-in-out infinite;
        white-space: nowrap;
      }

      @keyframes hintPulse {
        0%, 100% { 
          opacity: 0.6;
          transform: scale(1);
        }
        50% { 
          opacity: 1;
          transform: scale(1.05);
        }
      }

      /* 移动端标题隐藏 */
      .left-section.pulled .pixel-title {
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.5s ease;
      }

      /* 移动端动画优化 */
      .left-section {
        transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      }

      .left-section.pulled {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.3) rotate(-10deg);
        filter: blur(10px);
      }

      .login-section {
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .login-section.active {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        animation: formBounce 0.6s ease;
      }

      @keyframes formBounce {
        0% { transform: translate(-50%, -50%) scale(0.3); }
        50% { transform: translate(-50%, -50%) scale(1.05); }
        70% { transform: translate(-50%, -50%) scale(0.95); }
        100% { transform: translate(-50%, -50%) scale(1); }
      }
    }

    /* 加载动画 */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border-color);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 提示文字 */
    .hint-text {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.5s ease 0.3s;
    }

    .login-section.active .hint-text {
      opacity: 1;
      transform: translateY(0);
    }

    .hint-text i {
      margin-right: 6px;
      color: var(--gold);
    }
  </style>
</head>
<body>
  <!-- 加载遮罩 -->
  <div class="loading-overlay" id="loading">
    <div class="loader"></div>
  </div>

  <!-- 背景装饰 -->
  <div class="bg-decoration"></div>

  <!-- 主容器 -->
  <div class="container">
    <div class="content-wrapper">
      <!-- 左侧区域 - 标题和台灯 -->
      <div class="left-section" id="leftSection">
        <!-- 像素风标题 -->
        <div class="pixel-title" id="pixelTitle">
          <span class="line1">WELCOME TO</span>
          <span class="line2">声愈管理后台</span>
        </div>

        <!-- 台灯区域 -->
        <div class="lamp-section" id="lampSection">
          <div class="lamp-head">
            <div class="lamp-shade"></div>
            <div class="bulb" id="bulb"></div>
          </div>
          <div class="lamp-pole"></div>
          <div class="lamp-base"></div>
          
          <!-- 拉绳开关 -->
          <div class="pull-switch" id="pullSwitch">
            <div class="rope-container" id="ropeContainer">
              <div class="rope-handle"></div>
            </div>
            <span class="switch-hint">下拉开启</span>
          </div>
        </div>
      </div>

      <!-- 登录表单 -->
      <div class="login-section" id="loginSection">
        <div class="login-container">
          <div class="login-header">
            <h1>管理员登录</h1>
            <p>请输入您的账号信息</p>
          </div>

          <form id="loginForm">
            <div class="form-group">
              <label>用户名</label>
              <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
              <i class="fas fa-user"></i>
            </div>

            <div class="form-group">
              <label>密码</label>
              <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
              <i class="fas fa-lock"></i>
            </div>

            <div class="form-group">
              <label>验证码</label>
              <div class="captcha-wrapper">
                <input type="text" id="captcha" placeholder="请输入验证码" required maxlength="4" autocomplete="off">
                <img id="captchaImage" class="captcha-image" src="" alt="点击刷新验证码" title="点击刷新">
              </div>
            </div>

            <button type="submit" class="btn-login">
              <i class="fas fa-sign-in-alt"></i> 登录
            </button>
          </form>

          <div class="hint-text">
            <i class="fas fa-lightbulb"></i>
            提示：下拉灯绳可返回台灯界面
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 页面加载完成后隐藏加载动画
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
      }, 500);
    });

    // 获取元素
    const pullSwitch = document.getElementById('pullSwitch');
    const ropeContainer = document.getElementById('ropeContainer');
    const leftSection = document.getElementById('leftSection');
    const pixelTitle = document.getElementById('pixelTitle');
    const lampSection = document.getElementById('lampSection');
    const bulb = document.getElementById('bulb');
    const loginSection = document.getElementById('loginSection');
    const switchHint = document.querySelector('.switch-hint');
    const captchaImage = document.getElementById('captchaImage');
    
    let isPulled = false;
    let isDragging = false;
    let startY = 0;
    let currentY = 0;

    // 检查是否为移动端
    const isMobile = window.innerWidth <= 768;

    // 加载验证码 - 修复加载问题
    function loadCaptcha() {
      console.log('Loading captcha...');
      // 添加时间戳防止缓存
      const timestamp = Date.now();
      captchaImage.src = `/api/captcha?t=${timestamp}`;
      
      // 添加加载事件监听
      captchaImage.onload = function() {
        console.log('Captcha loaded successfully');
      };
      
      captchaImage.onerror = function() {
        console.error('Failed to load captcha');
        // 显示错误状态
        captchaImage.style.background = 'rgba(255,0,0,0.2)';
      };
    }

    // 页面加载时立即加载验证码
    document.addEventListener('DOMContentLoaded', function() {
      console.log('DOM loaded, initializing...');
      // 延迟一点加载验证码，确保DOM完全就绪
      setTimeout(loadCaptcha, 100);
    });

    // 拉动动画
    function pullAnimation() {
      if (ropeContainer.classList.contains('pulling')) return;
      
      ropeContainer.classList.add('pulling');
      
      setTimeout(() => {
        isPulled = !isPulled;
        
        if (isPulled) {
          // 开灯
          bulb.classList.add('on');
          leftSection.classList.add('pulled');
          pixelTitle.classList.add('hidden');
          loginSection.classList.add('active');
          switchHint.textContent = '下拉返回';
        } else {
          // 关灯
          bulb.classList.remove('on');
          leftSection.classList.remove('pulled');
          pixelTitle.classList.remove('hidden');
          loginSection.classList.remove('active');
          switchHint.textContent = '下拉开启';
          // 重新加载验证码
          setTimeout(loadCaptcha, 300);
        }
        
        setTimeout(() => {
          ropeContainer.classList.remove('pulling');
        }, 300);
      }, 300);
    }

    // 鼠标/触摸事件处理
    function handleStart(e) {
      isDragging = true;
      startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
      ropeContainer.style.transition = 'none';
    }

    function handleMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      
      currentY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
      const deltaY = currentY - startY;
      
      if (deltaY > 0) {
        const pullDistance = Math.min(deltaY, 60);
        ropeContainer.style.transform = `translateY(${pullDistance}px)`;
      }
    }

    function handleEnd(e) {
      if (!isDragging) return;
      isDragging = false;
      
      ropeContainer.style.transition = 'transform 0.3s ease';
      ropeContainer.style.transform = 'translateY(0)';
      
      const deltaY = currentY - startY;
      if (deltaY > 40) {
        pullAnimation();
      }
    }

    // 绑定事件
    pullSwitch.addEventListener('mousedown', handleStart);
    document.addEventListener('mousemove', handleMove);
    document.addEventListener('mouseup', handleEnd);

    pullSwitch.addEventListener('touchstart', handleStart, { passive: false });
    document.addEventListener('touchmove', handleMove, { passive: false });
    document.addEventListener('touchend', handleEnd);

    // 点击事件（作为备选）
    pullSwitch.addEventListener('click', (e) => {
      if (!isDragging) {
        pullAnimation();
      }
    });

    // 验证码刷新
    captchaImage.addEventListener('click', function() {
      console.log('Refreshing captcha...');
      loadCaptcha();
    });

    // 表单提交
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const captcha = document.getElementById('captcha').value;
      
      try {
        const response = await fetch('/api/auth/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password, captcha })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = '/admin/index.html';
        } else {
          alert(data.error || '登录失败');
          loadCaptcha();
        }
      } catch (error) {
        console.error('登录错误:', error);
        alert('网络错误，请稍后重试');
      }
    });

    // 窗口大小改变时重新检测
    window.addEventListener('resize', () => {
      const newIsMobile = window.innerWidth <= 768;
      if (newIsMobile !== isMobile) {
        location.reload();
      }
    });
  </script>
</body>
</html>
