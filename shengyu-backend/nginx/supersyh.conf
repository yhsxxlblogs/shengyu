server {
    listen 80;
    server_name supersyh.xyz www.supersyh.xyz;

    # 日志配置
    access_log /var/log/nginx/supersyh.access.log;
    error_log /var/log/nginx/supersyh.error.log;

    # 后台管理页面静态文件
    location /admin {
        alias /www/wwwroot/shengyu-backend/admin;
        index index.html;
        try_files $uri $uri/ /admin/index.html;

        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 上传文件访问
    location /uploads {
        alias /www/wwwroot/shengyu-backend/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 代理到后端 HTTP 服务 (3000端口)
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket 代理 (3001端口)
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时设置
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 根路径重定向到后台登录页
    location = / {
        return 302 /admin/index.html;
    }

    # 默认处理
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

