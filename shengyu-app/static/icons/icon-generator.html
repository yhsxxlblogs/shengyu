<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声愈应用图标生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
        }
        
        .icons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
        }
        
        .icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .icon-label {
            font-size: 16px;
            color: #666;
            font-weight: 500;
        }
        
        /* 72x72 图标 */
        .icon-72 {
            width: 72px;
            height: 72px;
        }
        
        /* 96x96 图标 */
        .icon-96 {
            width: 96px;
            height: 96px;
        }
        
        /* 144x144 图标 */
        .icon-144 {
            width: 144px;
            height: 144px;
        }
        
        /* 192x192 图标 */
        .icon-192 {
            width: 192px;
            height: 192px;
        }
        
        .instructions {
            max-width: 600px;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        
        .instructions h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 12px;
        }
        
        .instructions ol {
            padding-left: 20px;
            color: #666;
            line-height: 1.8;
        }
        
        .instructions li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <h1>🐾 声愈应用图标</h1>
    
    <div class="icons-container">
        <!-- 72x72 -->
        <div class="icon-wrapper">
            <svg class="icon-72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad72" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FF9A9E"/>
                        <stop offset="50%" style="stop-color:#FECFEF"/>
                        <stop offset="100%" style="stop-color:#FF9A9E"/>
                    </linearGradient>
                </defs>
                <rect width="72" height="72" rx="16" fill="url(#grad72)"/>
                <!-- 爪印 -->
                <ellipse cx="36" cy="42" rx="12" ry="10" fill="white"/>
                <ellipse cx="24" cy="28" rx="5" ry="6" fill="white"/>
                <ellipse cx="36" cy="24" rx="5" ry="6" fill="white"/>
                <ellipse cx="48" cy="28" rx="5" ry="6" fill="white"/>
                <ellipse cx="20" cy="40" rx="4" ry="5" fill="white"/>
                <ellipse cx="52" cy="40" rx="4" ry="5" fill="white"/>
            </svg>
            <span class="icon-label">72 x 72</span>
        </div>
        
        <!-- 96x96 -->
        <div class="icon-wrapper">
            <svg class="icon-96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad96" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FF9A9E"/>
                        <stop offset="50%" style="stop-color:#FECFEF"/>
                        <stop offset="100%" style="stop-color:#FF9A9E"/>
                    </linearGradient>
                </defs>
                <rect width="96" height="96" rx="22" fill="url(#grad96)"/>
                <!-- 爪印 -->
                <ellipse cx="48" cy="56" rx="16" ry="13" fill="white"/>
                <ellipse cx="32" cy="37" rx="7" ry="8" fill="white"/>
                <ellipse cx="48" cy="32" rx="7" ry="8" fill="white"/>
                <ellipse cx="64" cy="37" rx="7" ry="8" fill="white"/>
                <ellipse cx="27" cy="53" rx="5" ry="7" fill="white"/>
                <ellipse cx="69" cy="53" rx="5" ry="7" fill="white"/>
            </svg>
            <span class="icon-label">96 x 96</span>
        </div>
        
        <!-- 144x144 -->
        <div class="icon-wrapper">
            <svg class="icon-144" viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad144" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FF9A9E"/>
                        <stop offset="50%" style="stop-color:#FECFEF"/>
                        <stop offset="100%" style="stop-color:#FF9A9E"/>
                    </linearGradient>
                </defs>
                <rect width="144" height="144" rx="32" fill="url(#grad144)"/>
                <!-- 爪印 -->
                <ellipse cx="72" cy="84" rx="24" ry="20" fill="white"/>
                <ellipse cx="48" cy="56" rx="10" ry="12" fill="white"/>
                <ellipse cx="72" cy="48" rx="10" ry="12" fill="white"/>
                <ellipse cx="96" cy="56" rx="10" ry="12" fill="white"/>
                <ellipse cx="40" cy="80" rx="8" ry="10" fill="white"/>
                <ellipse cx="104" cy="80" rx="8" ry="10" fill="white"/>
            </svg>
            <span class="icon-label">144 x 144</span>
        </div>
        
        <!-- 192x192 -->
        <div class="icon-wrapper">
            <svg class="icon-192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad192" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FF9A9E"/>
                        <stop offset="50%" style="stop-color:#FECFEF"/>
                        <stop offset="100%" style="stop-color:#FF9A9E"/>
                    </linearGradient>
                </defs>
                <rect width="192" height="192" rx="44" fill="url(#grad192)"/>
                <!-- 爪印 -->
                <ellipse cx="96" cy="112" rx="32" ry="26" fill="white"/>
                <ellipse cx="64" cy="74" rx="13" ry="16" fill="white"/>
                <ellipse cx="96" cy="64" rx="13" ry="16" fill="white"/>
                <ellipse cx="128" cy="74" rx="13" ry="16" fill="white"/>
                <ellipse cx="54" cy="106" rx="10" ry="13" fill="white"/>
                <ellipse cx="138" cy="106" rx="10" ry="13" fill="white"/>
            </svg>
            <span class="icon-label">192 x 192</span>
        </div>
    </div>
    
    <div class="instructions">
        <h2>📸 如何保存图标</h2>
        <ol>
            <li>使用浏览器打开此文件</li>
            <li>按 F12 打开开发者工具</li>
            <li>右键点击要保存的 SVG 图标</li>
            <li>选择 "在新标签页中打开图片"</li>
            <li>右键保存为 PNG 格式</li>
            <li>或使用在线转换工具将 SVG 转换为 PNG</li>
        </ol>
    </div>
</body>
</html>
