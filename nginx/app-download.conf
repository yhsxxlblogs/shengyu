# 声愈应用 Nginx 配置（宝塔环境）
# 在原有配置基础上添加下载页面功能

server {
    listen 80;
    server_name shengyu.supersyh.xyz;

    # 日志配置 - 使用宝塔默认路径
    access_log /www/wwwlogs/supersyh.access.log;
    error_log /www/wwwlogs/supersyh.error.log;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # 上传文件访问 - 必须放在其他 location 之前
    location /uploads {
        alias /www/wwwroot/shengyu/shengyu-backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 应用下载页面 - 新增
    location /app-download.html {
        alias /www/wwwroot/shengyu/shengyu-backend/public/app-download.html;
        try_files $uri $uri/ =404;
    }

    # 应用截图目录 - 新增
    location /screenshots/ {
        alias /www/wwwroot/shengyu/shengyu-backend/public/screenshots/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ =404;
    }

    # APK 下载目录 - 新增
    location /downloads/ {
        alias /www/wwwroot/shengyu/shengyu-backend/public/downloads/;
        add_header Content-Disposition "attachment";
        add_header Content-Type "application/vnd.android.package-archive";
        expires 30d;
        try_files $uri $uri/ =404;
    }

    # 后台管理页面静态文件
    location /admin {
        alias /www/wwwroot/shengyu/shengyu-backend/admin/;
        index login.html index.html;
        try_files $uri $uri/ =404;
        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 代理
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket 代理
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 根路径重定向到应用下载页面 - 修改：从 /admin/login.html 改为 /app-download.html
    location = / {
        return 302 /app-download.html;
    }

    # 默认处理 - 放在最后
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
