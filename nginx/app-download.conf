# 声愈应用下载页面 Nginx 配置
# 将此配置添加到 nginx.conf 的 server 块中

server {
    listen 80;
    server_name shengyu.supersyh.xyz;  # 修改为你的域名
    
    # 强制重定向到应用下载页面
    location = / {
        return 301 /app-download.html;
    }
    
    # 应用下载页面
    location /app-download.html {
        alias /path/to/shengyu-backend/public/app-download.html;  # 修改为实际路径
        try_files $uri $uri/ =404;
    }
    
    # 应用截图目录
    location /screenshots/ {
        alias /path/to/shengyu-backend/public/screenshots/;  # 修改为实际路径
        try_files $uri $uri/ =404;
    }
    
    # APK 下载目录
    location /downloads/ {
        alias /path/to/shengyu-backend/public/downloads/;  # 修改为实际路径
        
        # 设置下载响应头
        add_header Content-Disposition "attachment";
        add_header Content-Type "application/vnd.android.package-archive";
        
        # 允许下载大文件
        client_max_body_size 100M;
        
        try_files $uri $uri/ =404;
    }
    
    # 静态资源（CSS、JS、图片等）
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        alias /path/to/shengyu-backend/public/;  # 修改为实际路径
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ =404;
    }
    
    # API 请求转发到后端服务
    location /api/ {
        proxy_pass http://localhost:3000;  # 后端服务地址
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # WebSocket 支持（用于私信功能）
    location /ws/ {
        proxy_pass http://localhost:3001;  # WebSocket 服务端口
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 错误页面
    error_page 404 /404.html;
    location = /404.html {
        internal;
        alias /path/to/shengyu-backend/public/404.html;  # 可选：自定义404页面
    }
    
    # 日志配置
    access_log /var/log/nginx/shengyu-access.log;
    error_log /var/log/nginx/shengyu-error.log;
}

# HTTPS 配置（推荐启用）
server {
    listen 443 ssl http2;
    server_name shengyu.supersyh.xyz;
    
    # SSL 证书配置
    ssl_certificate /path/to/your/ssl/cert.pem;      # 修改为你的证书路径
    ssl_certificate_key /path/to/your/ssl/key.pem;   # 修改为你的私钥路径
    
    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    
    # 强制重定向到应用下载页面
    location = / {
        return 301 /app-download.html;
    }
    
    # 其他配置同上...
    location /app-download.html {
        alias /path/to/shengyu-backend/public/app-download.html;
        try_files $uri $uri/ =404;
    }
    
    location /screenshots/ {
        alias /path/to/shengyu-backend/public/screenshots/;
        try_files $uri $uri/ =404;
    }
    
    location /downloads/ {
        alias /path/to/shengyu-backend/public/downloads/;
        add_header Content-Disposition "attachment";
        add_header Content-Type "application/vnd.android.package-archive";
        client_max_body_size 100M;
        try_files $uri $uri/ =404;
    }
    
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        alias /path/to/shengyu-backend/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ =404;
    }
    
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    location /ws/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    access_log /var/log/nginx/shengyu-ssl-access.log;
    error_log /var/log/nginx/shengyu-ssl-error.log;
}

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name shengyu.supersyh.xyz;
    return 301 https://$server_name$request_uri;
}